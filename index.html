const AVAILABLE_DATES = [...new Set(STOCK_HISTORY.map(r=>r.date))].sort();
function extMerge(rec) {
  if (!rec) return rec;
  const ext = STOCK_HISTORY_EXT[rec.date + '|' + rec.code];
  return Object.assign({}, rec, {
    instForeign: ext ? ext[0] : null,
    instTrust: ext ? ext[1] : null,
    instDealer: ext ? ext[2] : null
  });
}
function getStockRecord(code, date) {
  let rec = STOCK_HISTORY.find(r => r.code === code && r.date === date);
  if (rec) return extMerge(rec);
  const candidates = STOCK_HISTORY.filter(r => r.code === code && r.date <= date).sort((a,b)=>b.date.localeCompare(a.date));
  return candidates[0] ? extMerge(candidates[0]) : null;
}
function getStockRangeAgg(code, start, end) {
  const recs = STOCK_HISTORY.filter(r => r.code === code && r.date >= start && r.date <= end).sort((a,b)=>a.date.localeCompare(b.date)).map(extMerge);
  if (recs.length === 0) return null;
  const first = recs[0], last = recs[recs.length - 1];
  const vol = recs.reduce((s,r) => s + (r.vol || 0), 0);
  const withInst = recs.filter(r => r.inst !== null && r.inst !== undefined);
  const inst = withInst.length ? withInst.reduce((s,r) => s + r.inst, 0) : null;
  const withForeign = recs.filter(r => r.instForeign !== null && r.instForeign !== undefined);
  const instForeign = withForeign.length ? withForeign.reduce((s,r) => s + r.instForeign, 0) : null;
  const withTrust = recs.filter(r => r.instTrust !== null && r.instTrust !== undefined);
  const instTrust = withTrust.length ? withTrust.reduce((s,r) => s + r.instTrust, 0) : null;
  const withDealer = recs.filter(r => r.instDealer !== null && r.instDealer !== undefined);
  const instDealer = withDealer.length ? withDealer.reduce((s,r) => s + r.instDealer, 0) : null;
  return { code: last.code, name: last.name, industry: last.industry, market: last.market,
           close: last.close, chg: +(last.close - first.close).toFixed(2), vol, inst,
           instForeign, instTrust, instDealer,
           _rangeDays: recs.length, _rangeStart: first.date, _rangeEnd: last.date };
}

// ============ 數字標籤 plugin（在長條圖上直接顯示實際數字） ============
const valueLabelPlugin = {
  id: 'valueLabels',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    chart.data.datasets.forEach((dataset, i) => {
      const meta = chart.getDatasetMeta(i);
      meta.data.forEach((bar, index) => {
        const val = dataset.data[index];
        if (val === null || val === undefined) return;
        const label = (val >= 0 ? '+' : '−') + Math.abs(val).toLocaleString();
        ctx.save();
        ctx.fillStyle = val >= 0 ? '#b71c1c' : '#1b5e20';
        ctx.font = '600 11px -apple-system, "PingFang TC", sans-serif';
        ctx.textBaseline = 'middle';
        if (val >= 0) {
          ctx.textAlign = 'left';
          ctx.fillText(label, bar.x + 5, bar.y);
        } else {
          ctx.textAlign = 'right';
          ctx.fillText(label, bar.x - 5, bar.y);
        }
        ctx.restore();
      });
    });
  }
};
Chart.register(valueLabelPlugin);

// ============ 三大法人堆疊長條數字標籤 plugin（僅用於「各產業個股」圖，透過 chart 層級 plugins 陣列套用，不全域註冊） ============
const instStackLabelPlugin = {
  id: 'instStackLabels',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    chart.data.datasets.forEach((dataset, dsIndex) => {
      const meta = chart.getDatasetMeta(dsIndex);
      meta.data.forEach((bar, index) => {
        const raw = dataset.data[index];
        if (raw === null || raw === undefined || raw === 0) return;
        const val = Math.round(raw);
        const label = (val >= 0 ? '+' : '−') + Math.abs(val).toLocaleString();
        const props = bar.getProps(['x','y','base'], true);
        const segStart = Math.min(props.x, props.base);
        const segEnd = Math.max(props.x, props.base);
        const segWidth = segEnd - segStart;
        ctx.save();
        ctx.font = '600 10px -apple-system, "PingFang TC", sans-serif';
        ctx.textBaseline = 'middle';
        const textWidth = ctx.measureText(label).width;
        if (segWidth >= textWidth + 6) {
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.fillText(label, (segStart + segEnd) / 2, props.y);
        } else {
          ctx.fillStyle = '#333';
          if (val >= 0) {
            ctx.textAlign = 'left';
            ctx.fillText(label, segEnd + 3, props.y);
          } else {
            ctx.textAlign = 'right';
            ctx.fillText(label, segStart - 3, props.y);
          }
        }
        ctx.restore();
      });
    });
  }
};

function fmtSigned(n, unit) {
  if (n === null || n === undefined) return '—';
  const sign = n > 0 ? '▲' : (n < 0 ? '▼' : '');
  const cls = n > 0 ? 'up' : (n < 0 ? 'down' : 'flat');
  return `<span class="${cls}">${sign}${Math.abs(n).toLocaleString()}${unit||''}</span>`;
}

function selectTab(g, btnEl) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  if (g === FLOW_TAB) renderFlowTab();
  else if (g === INDUSTRY_FLOW_TAB) renderIndustryFlowTab();
  else if (g === SEARCH_TAB) renderSearchTab();
  else if (g === GROUPS_TAB) renderGroupsTab();
}

const INDUSTRY_COLOR = {};
const PALETTE = ['#5b8def','#f2994a','#9b59b6','#16a085','#e74c3c','#2c3e50','#e67e22','#27ae60','#2980b9','#8e44ad','#c0392b','#7f8c8d','#d35400','#1abc9c'];
function industryColor(ind) {
  if (!INDUSTRY_COLOR[ind]) {
    INDUSTRY_COLOR[ind] = PALETTE[Object.keys(INDUSTRY_COLOR).length % PALETTE.length];
  }
  return INDUSTRY_COLOR[ind];
}

function destroyCharts() {
  activeCharts.forEach(c => c.destroy());
  activeCharts = [];
}

function renderGroupsTab() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const subtabBar = document.createElement('div');
  subtabBar.className = 'subtabs';
  groupNames.forEach(g => {
    const sbtn = document.createElement('button');
    sbtn.className = 'subtab-btn' + (g === currentGroup ? ' active' : '');
    sbtn.textContent = g + `（${GROUPS[g].length}檔）`;
    sbtn.onclick = () => { currentGroup = g; renderGroupsTab(); };
    subtabBar.appendChild(sbtn);
  });
  content.appendChild(subtabBar);

  const groupBody = document.createElement('div');
  groupBody.id = 'groupBody';
  content.appendChild(groupBody);

  renderGroup(currentGroup, groupBody);
}

  destroyCharts();
  mode = mode || 'single';
  const isRange = mode === 'range';
  const date = dateOverride || AVAILABLE_DATES[AVAILABLE_DATES.length - 1];
  const rStart = rangeStart || AVAILABLE_DATES[0];
  const rEnd = rangeEnd || AVAILABLE_DATES[AVAILABLE_DATES.length - 1];

  const data = GROUPS[g].map(m => {
    const rec = isRange ? getStockRangeAgg(m.code, rStart, rEnd) : getStockRecord(m.code, date);
    return rec ? { code: m.code, name: m.name, industry: m.industry, market: m.market,

// ============ 蠟燭圖 plugin（用浮動長條圖模擬K線：影線+實體） ============
function buildCandleDatasets(history) {
  return [
    {
      label: '影線',
      data: history.map(d => [d.low, d.high]),
      backgroundColor: history.map(d => d.close >= d.open ? '#d32f2f' : '#2e7d32'),
      barPercentage: 0.12, categoryPercentage: 0.9,
      grouped: false, order: 1,
    },
    {
      label: '實體',
      data: history.map(d => [Math.min(d.open,d.close), Math.max(d.open,d.close)]),
      backgroundColor: history.map(d => d.close >= d.open ? '#d32f2f' : '#2e7d32'),
      barPercentage: 0.55, categoryPercentage: 0.9,
      grouped: false, order: 0,
    },
  ];
}

function fmtDate(d) { const [y,m,day] = d.split('-'); return `${m}/${day}`; }

// ============ 輕量自製日期選擇器（原生 input[type=date] 的年份快速跳轉清單不受 min/max 限制，會列出資料範圍外的年份，改用自製月曆避免混淆）============
function mountDatePicker(mountEl, min, max, value) {
  const state = { value };
  const api = {
    get value() { return state.value; },
    set value(v) { state.value = v; btn.textContent = fmtVal(v) + ' \ud83d\udcc5'; },
    onchange: null
  };

  function fmtVal(s) { return s.replace(/-/g, '/'); }
  function ymOf(s) { const [y, m] = s.split('-').map(Number); return { y, m }; }
  function pad(n) { return String(n).padStart(2, '0'); }
  function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }

  const wrap = document.createElement('span');
  wrap.style.cssText = 'position:relative;display:inline-block;';
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.textContent = fmtVal(value) + ' \ud83d\udcc5';
  btn.style.cssText = 'padding:5px 10px;border-radius:8px;border:1px solid #ddd;font-size:13px;background:#fff;cursor:pointer;color:#1d1d1f;';
  const popup = document.createElement('div');
  popup.style.cssText = 'position:absolute;top:calc(100% + 4px);left:0;z-index:100;background:#fff;border:1px solid #ddd;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,0.15);padding:10px;display:none;width:224px;';
  wrap.appendChild(btn);
  wrap.appendChild(popup);
  mountEl.appendChild(wrap);

  let viewY, viewM;

  function render() {
    popup.innerHTML = '';
    const head = document.createElement('div');
    head.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;';
    const prevBtn = document.createElement('button'); prevBtn.type = 'button'; prevBtn.textContent = '\u2039';
    const nextBtn = document.createElement('button'); nextBtn.type = 'button'; nextBtn.textContent = '\u203a';
    [prevBtn, nextBtn].forEach(b => { b.style.cssText = 'border:none;background:#f2f2f2;border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:14px;line-height:1;'; });
    const label = document.createElement('span');
    label.style.cssText = 'font-size:13px;font-weight:600;';
    label.textContent = `${viewY}\u5e74${pad(viewM)}\u6708`;
    head.appendChild(prevBtn); head.appendChild(label); head.appendChild(nextBtn);
    popup.appendChild(head);

    const minYm = ymOf(min), maxYm = ymOf(max);
    const prevCode = viewM === 1 ? (viewY - 1) * 100 + 12 : viewY * 100 + (viewM - 1);
    const nextCode = viewM === 12 ? (viewY + 1) * 100 + 1 : viewY * 100 + (viewM + 1);
    const minCode = minYm.y * 100 + minYm.m, maxCode = maxYm.y * 100 + maxYm.m;
    prevBtn.disabled = prevCode < minCode;
    nextBtn.disabled = nextCode > maxCode;
    prevBtn.style.opacity = prevBtn.disabled ? '0.3' : '1';
    nextBtn.style.opacity = nextBtn.disabled ? '0.3' : '1';
    prevBtn.style.cursor = prevBtn.disabled ? 'default' : 'pointer';
    nextBtn.style.cursor = nextBtn.disabled ? 'default' : 'pointer';
    prevBtn.onclick = () => { if (prevBtn.disabled) return; if (viewM === 1) { viewY--; viewM = 12; } else viewM--; render(); };
    nextBtn.onclick = () => { if (nextBtn.disabled) return; if (viewM === 12) { viewY++; viewM = 1; } else viewM++; render(); };

    const grid = document.createElement('div');
    grid.style.cssText = 'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;';
    ['\u65e5','\u4e00','\u4e8c','\u4e09','\u56db','\u4e94','\u516d'].forEach(d => {
      const c = document.createElement('div'); c.textContent = d;
      c.style.cssText = 'color:#999;font-size:10px;padding:2px 0;';
      grid.appendChild(c);
    });
    const firstDow = new Date(viewY, viewM - 1, 1).getDay();
    for (let i = 0; i < firstDow; i++) grid.appendChild(document.createElement('div'));
    const dim = daysInMonth(viewY, viewM);
    for (let d = 1; d <= dim; d++) {
      const dateStr = `${viewY}-${pad(viewM)}-${pad(d)}`;
      const cell = document.createElement('div');
      cell.textContent = String(d);
      const disabled = dateStr < min || dateStr > max;
      const selected = dateStr === state.value;
      cell.style.cssText = `padding:4px 0;border-radius:6px;font-size:12px;cursor:${disabled ? 'default' : 'pointer'};color:${disabled ? '#ccc' : (selected ? '#fff' : '#333')};background:${selected ? '#1d1d1f' : 'transparent'};`;
      if (!disabled) {
        cell.onclick = () => {
          state.value = dateStr;
          btn.textContent = fmtVal(dateStr) + ' \ud83d\udcc5';
          popup.style.display = 'none';
          popup.classList.remove('__dp_open');
          if (typeof api.onchange === 'function') api.onchange();
        };
      }
      grid.appendChild(cell);
    }
    popup.appendChild(grid);
  }

  btn.onclick = (e) => {
    e.stopPropagation();
    const isOpen = popup.style.display === 'block';
    document.querySelectorAll('.__dp_open').forEach(p => { p.style.display = 'none'; p.classList.remove('__dp_open'); });
    if (!isOpen) {
      const vy = ymOf(state.value);
      viewY = vy.y; viewM = vy.m;
      render();
      popup.style.display = 'block';
      popup.classList.add('__dp_open');
    }
  };
  document.addEventListener('click', (e) => { if (!wrap.contains(e.target)) { popup.style.display = 'none'; popup.classList.remove('__dp_open'); } });

  return api;
}

          }
        }
      },
      scales: {
        x: { ticks: { maxTicksLimit: 10, autoSkip: true } },
        y: { position:'left', title:{display:true,text:'單日(張)',font:{size:10}}, ticks:{ font:{size:9}, callback: v=>v.toLocaleString() } },
        y1: { position:'right', title:{display:true,text:'累計(張)',font:{size:10}}, grid:{drawOnChartArea:false}, ticks:{ font:{size:9}, callback: v=>v.toLocaleString() } },

function computeWindowCum(history) {
  let cum = 0;
  return history.map(d => {
    cum += d.dailyFlow;
    return Object.assign({}, d, { cumFlow: cum });
  });
}

      plugins: {
        valueLabels: false,
        legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
        tooltip: {
          callbacks: {
            label: (ctx) => `${ctx.dataset.label}：${ctx.raw >= 0 ? '+' : ''}${ctx.raw.toLocaleString()} 張`
          }
        }
      },
      scales: {
        x: { stacked: true, ticks: { maxTicksLimit: 16, autoSkip: true } },
        y: { stacked: true, ticks: { callback: v => v.toLocaleString() } }
      }
    }
  });
  activeCharts.push(chart);

  const card2 = document.createElement('div');
  card2.className = 'chart-card';
  card2.innerHTML = `<h3>🔍 單一產業趨勢（單日＋累計）</h3>
    <select style="padding:5px 10px;border-radius:8px;border:1px solid #ddd;font-size:13px;margin-bottom:12px;"></select>
    <div style="height:280px;position:relative;"><canvas></canvas></div>`;
  content.appendChild(card2);
  const indSel = card2.querySelector('select');
  const trendCanvas = card2.querySelector('canvas');
  const defaultIndustry = (selectedIndustry && industries.includes(selectedIndustry)) ? selectedIndustry : industries[0];
  industries.forEach(ind => {
    const opt = document.createElement('option');
    opt.value = ind; opt.textContent = ind;
    if (ind === defaultIndustry) opt.selected = true;
    indSel.appendChild(opt);
  });

  function renderIndTrend(ind) {
    const vals = dates.map(d => lookup[d + '|' + ind] || 0);
    let cum = 0;
    const cumVals = vals.map(v => cum += v);
    if (indTrendChartInstance) {
      indTrendChartInstance.destroy();
      activeCharts = activeCharts.filter(c => c !== indTrendChartInstance);
    }
    const t = new Chart(trendCanvas, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { type: 'bar', label: '單日買賣超', data: vals,
            backgroundColor: vals.map(v => v >= 0 ? 'rgba(211,47,47,0.65)' : 'rgba(46,125,50,0.65)'),
            yAxisID: 'y', order: 2 },
          { type: 'line', label: '累計買賣超', data: cumVals,
            borderColor: '#1d3557', backgroundColor: 'rgba(29,53,87,0.08)',
            borderWidth: 2, pointRadius: 0, tension: 0.25, fill: true, yAxisID: 'y1', order: 1 },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          valueLabels: false,
          legend: { position: 'top', labels: { boxWidth: 10, font: { size: 10 } } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}：${ctx.raw >= 0 ? '+' : ''}${ctx.raw.toLocaleString()} 張` } }
        },
        scales: {
          x: { ticks: { maxTicksLimit: 12, autoSkip: true } },
          y: { position: 'left', ticks: { font: { size: 9 }, callback: v => v.toLocaleString() } },
          y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { font: { size: 9 }, callback: v => v.toLocaleString() } }
        }
      }
    });
    indTrendChartInstance = t;
    activeCharts.push(t);
  }
  indSel.onchange = () => renderIndTrend(indSel.value);
  renderIndTrend(defaultIndustry);

  const legend = document.createElement('div');
  legend.className = 'legend-row';
  legend.innerHTML = `<span><span class="legend-dot" style="background:#d32f2f"></span>買超</span><span><span class="legend-dot" style="background:#2e7d32"></span>賣超</span><span>深藍線＝累計買賣超（右軸，依所選區間重新累計）</span>`;
  content.appendChild(legend);
}

// ============ 歷史查詢分頁 ============
function renderSearchTab() {
  destroyCharts();
  const content = document.getElementById('content');
  content.innerHTML = '';

  const industries = [...new Set(STOCK_HISTORY.map(r => r.industry))].sort();
  const minDate = AVAILABLE_DATES[0];
  const maxDate = AVAILABLE_DATES[AVAILABLE_DATES.length - 1];

  const card = document.createElement('div');
  card.className = 'chart-card';
  card.innerHTML = `
    <h3>🔍 個股歷史買賣超查詢</h3>
    <div style="font-size:11px;color:#999;margin:0 0 12px 2px;">可用代號、名稱、產業別、日期區間篩選，資料涵蓋 ${minDate} ～ ${maxDate}（共${AVAILABLE_DATES.length}個交易日）</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;">
      <input id="searchText" type="text" placeholder="輸入代號或名稱關鍵字" style="flex:1;min-width:160px;padding:7px 12px;border-radius:8px;border:1px solid #ddd;font-size:13px;">
      <select id="searchIndustry" style="padding:7px 12px;border-radius:8px;border:1px solid #ddd;font-size:13px;">
        <option value="">全部產業</option>
        ${industries.map(i => `<option value="${i}">${i}</option>`).join('')}
      </select>
      <span id="searchStartMount"></span>
      <span style="align-self:center;color:#999;font-size:12px;">至</span>
      <span id="searchEndMount"></span>
      <button id="searchBtn" style="padding:7px 18px;border-radius:8px;border:none;background:#1d1d1f;color:#fff;font-size:13px;cursor:pointer;">查詢</button>
    </div>
    <div id="searchCount" style="font-size:12px;color:#666;margin-bottom:8px;"></div>
    <div id="searchGrid"></div>
  `;
  content.appendChild(card);

  const searchStartPicker = mountDatePicker(document.getElementById('searchStartMount'), minDate, maxDate, minDate);
  const searchEndPicker = mountDatePicker(document.getElementById('searchEndMount'), minDate, maxDate, maxDate);

  let gridInstance = null;

  function runSearch() {
    const kw = document.getElementById('searchText').value.trim().toLowerCase();
    const ind = document.getElementById('searchIndustry').value;
    const start = searchStartPicker.value;
    const end = searchEndPicker.value;

    const rows = STOCK_HISTORY.filter(r => {
      if (kw && !(r.code.toLowerCase().includes(kw) || r.name.toLowerCase().includes(kw))) return false;
      if (ind && r.industry !== ind) return false;
      if (start && r.date < start) return false;
      if (end && r.date > end) return false;
      return true;
    }).sort((a, b) => b.date.localeCompare(a.date) || a.code.localeCompare(b.code));

    document.getElementById('searchCount').textContent = `符合 ${rows.length} 筆`;

    const tableData = rows.map(r => [
      r.date, r.code, r.name, r.industry,
      r.close, (r.chg > 0 ? '▲' : (r.chg < 0 ? '▼' : '')) + Math.abs(r.chg),
      r.vol.toLocaleString(),
      (r.inst === null || r.inst === undefined) ? '無資料' : ((r.inst >= 0 ? '買超 +' : '賣超 ') + Math.abs(r.inst).toLocaleString())
    ]);

    const gridEl = document.getElementById('searchGrid');
    gridEl.innerHTML = '';
    gridInstance = new gridjs.Grid({
      columns: ['日期', '代號', '名稱', '產業別', '收盤', '漲跌', '成交量(張)', '三大法人買賣超'],
      data: tableData,
      sort: true,
      pagination: { limit: 20 },
      style: { table: { fontSize: '13px' } }
    }).render(gridEl);
  }

  document.getElementById('searchBtn').onclick = runSearch;
  document.getElementById('searchText').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
  document.getElementById('searchIndustry').addEventListener('change', runSearch);
  searchStartPicker.onchange = runSearch;
  searchEndPicker.onchange = runSearch;
  runSearch();
}

// 初始渲染
renderGroupsTab();
</script>
</body>
</html>
